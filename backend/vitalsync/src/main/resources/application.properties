# ── Server ──────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.hmucsskdghytuombzncz.supabase.co:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_db_password}
supabase.url=${SUPABASE_URL:https://hmucsskdghytuombzncz.supabase.co}
supabase.anon-key=${SUPABASE_ANON_KEY:your_anon_key}
# Storage uploads need a Supabase-signed JWT. Since this app uses its own JWT auth,
# upload via the server using the Supabase service role key (kept in an env var).
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:your_service_role_key}

# ── JPA / Hibernate ─────────────────────────────────────────
# Set to 'none' because Supabase RLS policies block Hibernate ALTER TABLE DDL
# Tables are created by schema.sql using CREATE TABLE IF NOT EXISTS
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── SQL Init (runs schema.sql on startup) ──────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:migration_add_profile_language.sql
spring.jpa.defer-datasource-initialization=true

# ── HikariCP Connection Pool ─────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── Multipart (file uploads for report images) ──────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:your_jwt_secret}
app.jwt.expiration-ms=86400000

# ── Google Gemini ─────────────────────────────────────────────
# Key 1 — Medical Report Intelligence (OCR + Friendly Coach summary)
app.gemini.api-key-primary=${APP_GEMINI_API_KEY_PRIMARY:your_primary_gemini_key}
# Key 2 — Nutritional Computer Vision (food photo analysis)
app.gemini.api-key-secondary=${APP_GEMINI_API_KEY_SECONDARY:your_secondary_gemini_key}
app.gemini.model=gemini-2.5-flash
app.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models

# ── HuggingFace (Predictive Risk ML) ─────────────────────────
# Token from: https://huggingface.co/settings/tokens
app.huggingface.api-key=${APP_HUGGINGFACE_API_KEY:your_huggingface_key}
# Deployed model endpoint (or HF Inference API URL for your model)
app.huggingface.endpoint=https://router.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2


# ── SOS Thresholds ────────────────────────────────────────────
app.sos.bp-systolic-high=180
app.sos.bp-diastolic-high=120
app.sos.blood-sugar-high=300
app.sos.blood-sugar-low=50

# ── Logging ──────────────────────────────────────────────────
logging.level.com.healthcare.vitalsync=DEBUG
logging.level.org.springframework.security=INFO

spring.sql.init.separator=@@
